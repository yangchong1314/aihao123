<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background -->
  <rect width="200" height="200" rx="40" fill="linear-gradient(135deg, #667eea 0%, #764ba2 100%)"/>
  
  <!-- AI Robot Icon -->
  <g transform="translate(50, 40)">
    <!-- Robot Head -->
    <rect x="25" y="20" width="50" height="45" rx="10" fill="white"/>
    
    <!-- Eyes -->
    <circle cx="40" cy="40" r="6" fill="#667eea"/>
    <circle cx="60" cy="40" r="6" fill="#667eea"/>
    
    <!-- Antenna -->
    <line x1="50" y1="20" x2="50" y2="5" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <circle cx="50" cy="5" r="4" fill="#ff6b6b"/>
    
    <!-- Body -->
    <rect x="30" y="70" width="40" height="35" rx="8" fill="white" opacity="0.9"/>
    
    <!-- Screen on body -->
    <rect x="38" y="78" width="24" height="18" rx="3" fill="#667eea" opacity="0.3"/>
    <line x1="42" y1="84" x2="58" y2="84" stroke="#667eea" stroke-width="2" stroke-linecap="round"/>
    <line x1="42" y1="90" x2="52" y2="90" stroke="#667eea" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Arms -->
    <path d="M25 75 Q15 85 20 95" stroke="white" stroke-width="4" stroke-linecap="round" fill="none"/>
    <path d="M75 75 Q85 85 80 95" stroke="white" stroke-width="4" stroke-linecap="round" fill="none"/>
  </g>
  
  <!-- Text -->
  <text x="100" y="175" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">AI日报</text>
</svg>
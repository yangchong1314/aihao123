<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AI好工具</title>
  <script>
    // GitHub Pages SPA redirect
    var path = window.location.pathname;
    var repo = '/aihao123';
    
    // If not already at repo root, redirect to index with path as hash
    if (path.indexOf(repo) === 0) {
      var newPath = path.replace(repo, '');
      if (newPath && newPath !== '/') {
        window.location.href = repo + '/#' + newPath;
      } else {
        window.location.href = repo + '/';
      }
    }
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>

<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 渐变背景 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    
    <!-- 装饰图案 -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="rgba(255,255,255,0.1)"/>
    </pattern>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- 装饰圆圈 -->
  <circle cx="100" cy="100" r="150" fill="rgba(255,255,255,0.05)"/>
  <circle cx="1100" cy="530" r="200" fill="rgba(255,255,255,0.05)"/>
  
  <!-- 主内容区域 -->
  <g transform="translate(100, 150)">
    <!-- Logo 图标 -->
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="120" fill="white">🤖</text>
    
    <!-- 网站名称 -->
    <text x="0" y="140" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white">AI好工具</text>
    
    <!-- 副标题 -->
    <text x="0" y="220" font-family="Arial, sans-serif" font-size="36" fill="rgba(255,255,255,0.9)">发现好用的 AI 工具</text>
    
    <!-- 描述 -->
    <text x="0" y="290" font-family="Arial, sans-serif" font-size="24" fill="rgba(255,255,255,0.7)">
      精选国内外优质 AI 工具 · 涵盖写作、绘画、编程、办公等多个领域
    </text>
  </g>
  
  <!-- 右侧工具图标装饰 -->
  <g transform="translate(800, 100)">
    <rect x="0" y="0" width="80" height="80" rx="16" fill="rgba(255,255,255,0.15)"/>
    <text x="20" y="60" font-family="Arial, sans-serif" font-size="40" fill="white">✍️</text>
    
    <rect x="100" y="50" width="80" height="80" rx="16" fill="rgba(255,255,255,0.15)"/>
    <text x="120" y="110" font-family="Arial, sans-serif" font-size="40" fill="white">🎨</text>
    
    <rect x="50" y="150" width="80" height="80" rx="16" fill="rgba(255,255,255,0.15)"/>
    <text x="70" y="210" font-family="Arial, sans-serif" font-size="40" fill="white">💻</text>
    
    <rect x="150" y="120" width="80" height="80" rx="16" fill="rgba(255,255,255,0.15)"/>
    <text x="170" y="180" font-family="Arial, sans-serif" font-size="40" fill="white">📊</text>
  </g>
  
  <!-- 底部 URL -->
  <text x="600" y="580" font-family="Arial, sans-serif" font-size="24" fill="rgba(255,255,255,0.6)" text-anchor="middle">aihao123-two.vercel.app</text>
</svg>
